<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portifólio 02</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body class="font-main">
    <!--HEADER-->
    <header class="flex flex-row justify-between items-center px-8 py-8 bg-black text-white">

      <div class="flex flex-row items-center gap-4">
        <div class="size-12">
          <img src="/icon_logo.png" alt="Logo do site">
        </div>
        <h1 class="text-4xl">Portifólio</h1>
      </div>

      <div class="size-8">
        <img src="/icon_hamburguer.png" alt="Ícone do menu hambúrguer">
      </div>
    </header>

    <!--HERO-->
    <section class="text-black px-6 py-16 bg-white"> 
      <div class="max-w-[400px] max-h-[400px]">
        <img src="/sally.png" alt="Mascote Sally canguru">
      </div>
      <div class="flex flex-col gap-12"> 
        <div class="text-center flex flex-col items-center gap-8">
          <div class="flex flex-col gap-8">
            <h2 class="text-5xl">Conheça a <span class="text-secondary">Sally</span></h2>
            <div class="flex flex-col gap-4">
              <h3 class="text-2xl">
                A mascote da <span class="text-secondary">byron.solutions!</span>
              </h3>
              <p class="text-base">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eum nobis cupiditate optio aliquam incidunt ex sint minus sequi in distinctio.
              </p>
            </div>
          </div>
          <button class="text-2xl font-semibold text-white bg-main px-4 py-2 rounded-2xl hover:bg-teal-600 transition duration-200">SAIBA MAIS</button>
        </div>
        <div class="flex flex-row justify-between items-center ">
          <p class="text-2xl">Nos contate!</p>
          <div class="flex flex-row gap-6">
            <div class="size-12">
              <a href="https://www.instagram.com/heitor_srm/" target="_blank">
                <img src="/icon_insta.png" alt="Logo do instagram"/>
              </a>
            </div>
            <div class="size-12">
              <a href="https://www.linkedin.com/in/heitor-sebastiao-ribeiro-de-moura-38ba65358/" target="_blank">
                <img src="/icon_linkedin.png" alt="Logo do linkedin" />
              </a>
            </div>
            <div class="size-12">
              <a href="#" target="_blank">
                <img src="/icon_zap.png" alt="Logo do whatsapp"/>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
